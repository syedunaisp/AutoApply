name = "autoapply-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[triggers]
crons = []
# crons = ["0 8 * * *"]  # disabled — re-enable when upgrading to Workers Paid plan

[[d1_databases]]
binding = "DB"
database_name = "autoapply"
database_id = "ee7942f1-f29a-494c-a631-89e37c95e9c7"
migrations_dir = "../packages/db/migrations"

[[vectorize]]
binding = "VECTORIZE"
index_name = "job-embeddings"

[[r2_buckets]]
binding = "R2"
bucket_name = "autoapply-resumes"

[ai]
binding = "AI"

[[queues.producers]]
binding = "JOB_QUEUE"
queue = "job-processing-queue"

[[queues.producers]]
binding = "MATCH_QUEUE"
queue = "match-queue"

[[queues.consumers]]
queue = "job-processing-queue"
max_batch_size = 5
max_batch_timeout = 30
max_retries = 3

[[queues.consumers]]
queue = "match-queue"
max_batch_size = 1
max_batch_timeout = 60
max_retries = 3

[vars]
# R2_PUBLIC_URL — Moved to secrets to resolve binding conflict
# (Previous value: "https://resumes.autoapply.io")

# Secrets (set via `wrangler secret put`):
# RESEND_API_KEY      — Resend API key with sending access
# SENDING_DOMAIN      — verified domain on Resend (e.g. mail.henceprove.com)
# APOLLO_API_KEY      — Apollo.io API key
# ZERO_BOUNCE_API_KEY — ZeroBounce validation API key
# R2_PUBLIC_URL       — Public URL for R2 bucket
# ADMIN_ALERT_EMAIL   — where zero-result alerts go
# SCRAPER_URL         — VPS endpoint for Python scraper
# BROWSERLESS_API_TOKEN — browserless.io token for ATS form submission (free: 60 hrs/mo)
#                         Sign up at https://browserless.io, no credit card required
